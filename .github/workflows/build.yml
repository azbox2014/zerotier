name: Build ZeroTierOne Image (Tag)

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "ZeroTierOne VERSION (e.g. 1.14.0)"
        required: false
        default: "1.14.0"

  pull_request:
    branches:
      - 'main'

  schedule:
    - cron: "30 2 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zerotier-one

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1️⃣ Checkout workflow repo
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2️⃣ Clone ZeroTierOne tag
      # =========================
      - name: Clone ZeroTierOne
        run: |
          if [ -z "${{ inputs.VERSION }}" ]; then
            git clone https://github.com/zerotier/ZeroTierOne.git
            cd ZeroTierOne
            echo "VERSION=$(git tag | sort -rV | head -n 1)" >> $GITHUB_ENV
          else
            echo "VERSION=${{ inputs.VERSION }}" >> $GITHUB_ENV
          fi

      # ======================
      # 3️⃣ QEMU (multi-arch)
      # ======================
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ======================
      # 4️⃣ Buildx
      # ======================
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # ======================
      # 5️⃣ Login registry
      # ======================
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      # ======================
      # 6️⃣ Build & Push multi-arch
      # ======================
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ZeroTierOne
          file: ZeroTierOne/Dockerfile.release
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ inputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/zerotier-one:${{ inputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/zerotier-one:latest